<!-- Horae 訊息元數據面板模範 -->
<div class="horae-message-panel" data-message-id="{{messageId}}">
    <div class="horae-panel-toggle">
        <div class="horae-panel-icon">
            <i class="fa-regular fa-clock"></i>
        </div>
        <div class="horae-panel-summary">
            <span class="horae-summary-time">{{time}}</span>
            <span class="horae-summary-divider">|</span>
            <span class="horae-summary-event">{{eventSummary}}</span>
            <span class="horae-summary-divider">|</span>
            <span class="horae-summary-chars">{{characterCount}}人在場</span>
        </div>
        <div class="horae-panel-actions">
            <button class="horae-btn-edit" title="編輯">
                <i class="fa-solid fa-pen"></i>
            </button>
            <button class="horae-btn-expand" title="展開/收起">
                <i class="fa-solid fa-chevron-down"></i>
            </button>
        </div>
    </div>
    <div class="horae-panel-content" style="display: none;">
        <div class="horae-panel-grid">
            <!-- 時間行 -->
            <div class="horae-panel-row">
                <label><i class="fa-regular fa-clock"></i> 時間</label>
                <div class="horae-panel-value">
                    <input type="text" class="horae-input-datetime" placeholder="日期 時間（如 2026/2/4 15:00）" value="{{storyDate}}{{#storyTime}} {{storyTime}}{{/storyTime}}">
                </div>
            </div>

            <!-- 地點行 -->
            <div class="horae-panel-row">
                <label><i class="fa-solid fa-location-dot"></i> 地點</label>
                <div class="horae-panel-value">
                    <input type="text" class="horae-input-location" placeholder="如: 咖啡馆 > 二樓" value="{{location}}">
                </div>
            </div>

            <!-- 氛圍行 -->
            <div class="horae-panel-row">
                <label><i class="fa-solid fa-cloud"></i> 氛圍</label>
                <div class="horae-panel-value">
                    <input type="text" class="horae-input-atmosphere" placeholder="如: 輕鬆、緊張" value="{{atmosphere}}">
                </div>
            </div>

            <!-- 在場角色 -->
            <div class="horae-panel-row">
                <label><i class="fa-solid fa-users"></i> 在場</label>
                <div class="horae-panel-value">
                    <input type="text" class="horae-input-characters" placeholder="用逗號分隔" value="{{characters}}">
                </div>
            </div>

            <!-- 服裝列表 -->
            <div class="horae-panel-row full-width">
                <label><i class="fa-solid fa-shirt"></i> 服裝變化</label>
                <div class="horae-costume-editor" id="horae-costumes-{{messageId}}">
                    {{costumeEditors}}
                </div>
                <button class="horae-btn-add-costume" title="添加服裝記錄">
                    <i class="fa-solid fa-plus"></i> 添加
                </button>
            </div>

            <!-- 物品列表 -->
            <div class="horae-panel-row full-width">
                <label><i class="fa-solid fa-box-open"></i> 物品變化</label>
                <div class="horae-items-editor" id="horae-items-{{messageId}}">
                    {{itemEditors}}
                </div>
                <button class="horae-btn-add-item" title="添加物品記錄">
                    <i class="fa-solid fa-plus"></i> 添加
                </button>
            </div>

            <!-- 事件標記 -->
            <div class="horae-panel-row full-width">
                <label><i class="fa-solid fa-bookmark"></i> 事件標記</label>
                <div class="horae-event-editor">
                    <select class="horae-input-event-level">
                        <option value="">無</option>
                        <option value="一般" {{eventLevelNormal}}>一般</option>
                        <option value="重要" {{eventLevelImportant}}>重要</option>
                        <option value="關鍵" {{eventLevelCritical}}>關鍵</option>
                    </select>
                    <input type="text" class="horae-input-event-summary" placeholder="事件摘要（20字以內）" value="{{eventSummaryText}}">
                </div>
            </div>

            <!-- 好感度變化 -->
            <div class="horae-panel-row full-width">
                <label><i class="fa-solid fa-heart"></i> 好感度變化</label>
                <div class="horae-affection-editor" id="horae-affection-{{messageId}}">
                    {{affectionEditors}}
                </div>
                <button class="horae-btn-add-affection" title="添加好感度變化">
                    <i class="fa-solid fa-plus"></i> 添加
                </button>
            </div>
        </div>

        <div class="horae-panel-footer">
            <button class="horae-btn-save horae-btn">
                <i class="fa-solid fa-check"></i> 保存
            </button>
            <button class="horae-btn-cancel horae-btn">
                <i class="fa-solid fa-xmark"></i> 取消
            </button>
            <button class="horae-btn-goto horae-btn" title="跳轉到此訊息">
                <i class="fa-solid fa-arrow-right"></i> 跳轉
            </button>
        </div>
    </div>
</div>
